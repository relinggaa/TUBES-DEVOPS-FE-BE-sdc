; PHP production settings optimized for Laravel
[PHP]
; Error handling — silent in production, log to file
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Performance
max_execution_time = 120
max_input_time = 60
memory_limit = 256M

; File uploads (match Nginx client_max_body_size)
upload_max_filesize = 10M
post_max_size = 10M
max_file_uploads = 20

; Timezone
date.timezone = Asia/Jakarta

; OPcache — critical for production PHP performance
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
