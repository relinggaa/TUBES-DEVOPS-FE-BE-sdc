server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # ── Health check endpoint (used by Docker & K8s) ──────────────────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── Static assets — long cache, served directly by Nginx ─────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location /storage/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|css|js|gif|jpe?g|png|svg|webp|woff2?|ttf|eot|glb|gltf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── Main application — pass to PHP-FPM ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;

        # Timeouts
        fastcgi_read_timeout 120;
        fastcgi_connect_timeout 10;

        # Buffers
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # ── Deny access to hidden files ───────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Deny access to sensitive Laravel files ────────────────────────────────
    location ~ ^/(\.env|composer\.(json|lock)|package\.json|artisan) {
        deny all;
        return 404;
    }
}
