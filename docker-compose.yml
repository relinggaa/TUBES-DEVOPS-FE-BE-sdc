services:
  # ── Application (PHP-FPM + Nginx via supervisord) ──────────────────────────
  app:
    image: ${DOCKER_IMAGE:-sdc-app}:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sdc-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 3306
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sdc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: sdc-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: sdc
      MYSQL_USER: sdc_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - sdc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=rootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sdc-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sdc-network

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  logs_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  sdc-network:
    driver: bridge
